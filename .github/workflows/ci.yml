name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint JavaScript (eslint)
        working-directory: frontend
        run: |
          npm ci
          npx eslint app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and test tools
        run: |
          pip install -r api/requirements.txt -r worker/requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Run tests with coverage
        run: |
          pytest api/ worker/ --cov=api --cov=worker --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build, tag, and push images
        run: |
          for svc in api worker frontend; do
            docker build \
              -t localhost:5000/microapp-$svc:${{ github.sha }} \
              -t localhost:5000/microapp-$svc:latest \
              ./$svc
            docker push localhost:5000/microapp-$svc:${{ github.sha }}
            docker push localhost:5000/microapp-$svc:latest
          done

      - name: Verify images exist in the registry
        run: |
          curl -s http://localhost:5000/v2/_catalog

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          for svc in api worker frontend; do
            docker build -t microapp-$svc:scan ./$svc
          done

      - name: Scan api image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: microapp-api:scan
          severity: CRITICAL
          exit-code: "1"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: microapp-worker:scan
          severity: CRITICAL
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: microapp-frontend:scan
          severity: CRITICAL
          exit-code: "1"
