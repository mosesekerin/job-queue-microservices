name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint JavaScript (eslint)
        working-directory: frontend
        run: |
          npm ci
          npx eslint app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and test tools
        run: |
          pip install -r api/requirements.txt -r worker/requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Run tests with coverage
        run: |
          pytest api/ worker/ --cov=api --cov=worker --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build, tag, and push images
        run: |
          for svc in api worker frontend; do
            docker build \
              -t localhost:5000/microapp-$svc:${{ github.sha }} \
              -t localhost:5000/microapp-$svc:latest \
              ./$svc
            docker push localhost:5000/microapp-$svc:${{ github.sha }}
            docker push localhost:5000/microapp-$svc:latest
          done

      - name: Verify images exist in the registry
        run: |
          curl -s http://localhost:5000/v2/_catalog

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          for svc in api worker frontend; do
            docker build -t microapp-$svc:scan ./$svc
          done

      - name: Scan api image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: microapp-api:scan
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: microapp-worker:scan
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: microapp-frontend:scan
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create CI environment file
        run: echo "REDIS_PASSWORD=ci-test-password-$(openssl rand -hex 8)" > .env

      - name: Start the full stack
        run: docker compose up -d --build --wait

      - name: Submit a job and verify it completes
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job: $JOB_ID"

          for i in $(seq 1 10); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test PASSED"
              exit 0
            fi
            sleep 2
          done

          echo "Job never completed - integration test FAILED"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server over SSH
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ~/micro-service-app/job-queue-microservices && git pull origin main && ./deploy.sh"
